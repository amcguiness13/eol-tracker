# Render service definitions for eol-tracker monorepo
# - Backend: Web Service (builds the whole repo then runs backend entrypoint)
# - Frontend: Static Site (builds frontend workspace and publishes dist)

services:
  - type: web_service
    name: eol-tracker-backend
    env: node
    branch: main
    plan: starter
    root: .
    buildCommand: npm ci --omit=none && npm run build
    startCommand: node packages/backend/dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: static_site
    name: eol-tracker-frontend
    branch: main
    root: .
    buildCommand: npm ci --omit=none && npm run build --workspace packages/frontend
    publishPath: packages/frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://eol-tracker.onrender.com
        sync: false
